services:
  postgres:
    image: postgres:17
    container_name: veyra-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?DB name required}
      POSTGRES_USER: ${POSTGRES_USER:?DB user required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?DB password required}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U veyra_user -d veyra_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: veyra-minio
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${STORAGE_S3_ACCESS_KEY:?MinIO access key required}
      MINIO_ROOT_PASSWORD: ${STORAGE_S3_SECRET_KEY:?MinIO secret key required}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5

  veyra-app:
    build: .
    container_name: veyra-api
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/veyra_db
      STORAGE_S3_ENDPOINT: http://minio:9000

volumes:
  postgres_data:
  minio_data:
