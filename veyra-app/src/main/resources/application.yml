spring:
  application:
    name: veyra-api
  threads:
    virtual:
      enabled: true

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 10000
      idle-timeout: 300000
      max-lifetime: 600000

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

  lifecycle:
    timeout-per-shutdown-phase: 30s

jwt:
  # JWT_SECRET env var zorunludur — fallback yoktur.
  # HS256 için en az 32 karakter (256 bit) olmalıdır.
  secret: ${JWT_SECRET}
  expiration: 900000              # 15 dakika (ms) — kısa ömürlü access token
  refresh-expiration-days: 7      # 7 gün — refresh token DB'de saklanır, revoke edilebilir

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: ${SWAGGER_ENABLED:true}
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    enabled: ${SWAGGER_ENABLED:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

server:
  port: 8080
  shutdown: graceful
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
  tomcat:
    max-http-form-post-size: 1MB
    max-swallow-size: 1MB

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

admin:
  email: ${ADMIN_EMAIL}
  password: ${ADMIN_PASSWORD}
