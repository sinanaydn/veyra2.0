spring:
  application:
    name: veyra-api

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/veyra_db}
    username: ${SPRING_DATASOURCE_USERNAME:veyra_user}
    password: ${SPRING_DATASOURCE_PASSWORD:veyra_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update        # İlk geliştirmede 'update', production'da 'validate' olacak
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

jwt:
  # JWT_SECRET env var zorunludur — fallback yoktur.
  # HS256 için en az 32 karakter (256 bit) olmalıdır.
  secret: ${JWT_SECRET}
  expiration: 900000              # 15 dakika (ms) — kısa ömürlü access token
  refresh-expiration-days: 7      # 7 gün — refresh token DB'de saklanır, revoke edilebilir

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

server:
  port: 8080

admin:
  email: ${ADMIN_EMAIL:admin@veyra.com}
  # ADMIN_PASSWORD env var zorunludur — fallback yoktur.
  # Uygulama bu değer set edilmeden başlatılmamalıdır.
  password: ${ADMIN_PASSWORD}
